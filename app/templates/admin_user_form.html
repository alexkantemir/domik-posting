{% extends "base.html" %}
{% block title %}{% if target %}Редактировать{% else %}Новый пользователь{% endif %} — Домик{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="/admin/users" class="btn btn-sm btn-light me-3" style="border-radius:8px;">←</a>
  <div>
    <h4 class="fw-bold mb-0" style="color:#1a3c5e;">
      {% if target %}Редактировать пользователя{% else %}Новый пользователь{% endif %}
    </h4>
  </div>
</div>

{% if error %}
<div class="alert alert-danger py-2 px-3 mb-3" style="font-size:.9rem;">
  <i class="bi bi-exclamation-circle"></i> {{ error }}
</div>
{% endif %}

<div class="stat-card" style="max-width:480px;">
  <form method="post"
        action="{% if target %}/admin/users/{{ target.id }}/edit{% else %}/admin/users/new{% endif %}">

    <div class="mb-3">
      <label class="form-label fw-semibold" style="color:#1a3c5e; font-size:.9rem;">Имя</label>
      <input type="text" name="name" class="form-control" required
             value="{{ target.name if target else '' }}"
             placeholder="Иван Петров">
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold" style="color:#1a3c5e; font-size:.9rem;">Email</label>
      <input type="email" name="email" class="form-control" required
             value="{{ target.email if target else '' }}"
             placeholder="user@domik-l.spb.ru">
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold" style="color:#1a3c5e; font-size:.9rem;">Роль</label>
      <select name="role" class="form-select">
        {% for val, label in roles.items() %}
        <option value="{{ val }}"
          {% if target and target.role == val %}selected
          {% elif not target and val == 'editor' %}selected{% endif %}>
          {{ label }}
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold" style="color:#1a3c5e; font-size:.9rem;">
        {% if target %}Новый пароль <span class="text-muted fw-normal">(оставьте пустым, чтобы не менять)</span>{% else %}Пароль{% endif %}
      </label>
      <input type="password" name="password" class="form-control"
             {% if not target %}required{% endif %}
             placeholder="{% if target %}Новый пароль…{% else %}Минимум 6 символов{% endif %}"
             autocomplete="new-password">
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn fw-semibold px-4"
              style="background:#1a3c5e;color:#fff;border-radius:8px;">
        <i class="bi bi-check2"></i> {% if target %}Сохранить{% else %}Создать{% endif %}
      </button>
      <a href="/admin/users" class="btn btn-light" style="border-radius:8px;">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
