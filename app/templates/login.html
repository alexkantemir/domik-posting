<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — Домик постинг</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a3c5e 0%, #2d6a9f 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%; max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .login-logo {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: .5rem;
    }
    .login-title {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a3c5e;
      margin-bottom: .25rem;
    }
    .login-subtitle {
      text-align: center;
      font-size: .85rem;
      color: #888;
      margin-bottom: 2rem;
    }
    .btn-login {
      background: #1a3c5e;
      color: #fff;
      border: none;
      padding: .65rem;
      font-weight: 600;
      border-radius: 8px;
      width: 100%;
    }
    .btn-login:hover { background: #2d6a9f; color: #fff; }
    .form-control:focus { border-color: #2d6a9f; box-shadow: 0 0 0 .2rem rgba(45,106,159,.2); }
    label { font-size: .87rem; font-weight: 500; color: #444; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">🏠</div>
    <div class="login-title">Домик — Постинг</div>
    <div class="login-subtitle">Панель управления публикациями</div>

    {% if error %}
    <div class="alert alert-danger py-2 px-3 mb-3" style="font-size:.88rem;">
      <i class="bi bi-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="mb-3">
        <label for="email">Email</label>
        <input
          type="email" id="email" name="email"
          class="form-control mt-1" placeholder="you@domik-l.spb.ru"
          value="{{ email }}"
          required autofocus
        >
      </div>
      <div class="mb-4">
        <label for="password">Пароль</label>
        <input
          type="password" id="password" name="password"
          class="form-control mt-1" placeholder="••••••••"
          required
        >
      </div>
      <button type="submit" class="btn-login">Войти</button>
    </form>
  </div>

</body>
</html>
