services:
  app:
    build: .
    restart: always
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  db:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    restart: always
    environment:
      POSTGRES_DB: domik
      POSTGRES_USER: domik
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pg-certs/server.crt:/pg-certs/server.crt:ro
      - ./pg-certs/server.key:/pg-certs/server.key:ro
    command: >
      postgres
      -c ssl=on
      -c ssl_cert_file=/pg-certs/server.crt
      -c ssl_key_file=/pg-certs/server.key
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U domik"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  nginx:
    image: nginx:alpine@sha256:20316569d8f81a160065d7d2a5eeffc7ca97d79022462ee255fd23fa103a6b5c
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/rate_limit.conf:/etc/nginx/conf.d/rate_limit.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  postgres_data:
  certbot_www:
  certbot_certs:

networks:
  internal:
